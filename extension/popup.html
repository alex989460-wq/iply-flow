<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8" />
<title>SuperGestor Auto-Renew</title>
<style>
  body { font-family: -apple-system, system-ui, sans-serif; width: 340px; padding: 14px; margin: 0; background: #0f172a; color: #e2e8f0; }
  .header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
  .header img { width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0; }
  .header .titles { display: flex; flex-direction: column; }
  h1 { font-size: 15px; margin: 0; line-height: 1.1; }
  .sub { font-size: 11px; opacity: .6; margin-top: 2px; }
  label { font-size: 11px; opacity: .75; display: block; margin: 8px 0 3px; text-transform: uppercase; letter-spacing: .5px; }
  input { width: 100%; box-sizing: border-box; padding: 6px 8px; border-radius: 6px; border: 1px solid #334155; background: #1e293b; color: #f1f5f9; font-size: 12px; }
  button { margin-top: 8px; width: 100%; padding: 8px; border-radius: 6px; border: 0; background: #3b82f6; color: white; font-weight: 600; cursor: pointer; font-size: 12px; }
  button.secondary { background: #334155; }
  button.mini { width: auto; padding: 4px 8px; margin: 0; font-size: 10px; font-weight: 500; background: #334155; }
  .status { margin-top: 12px; padding: 8px; border-radius: 6px; background: #1e293b; font-size: 11px; line-height: 1.5; }
  .ok { color: #4ade80; } .bad { color: #f87171; } .warn { color: #fbbf24; }
  .toggle { display: flex; align-items: center; gap: 8px; margin-top: 10px; font-size: 13px; }
  .panels { margin-top: 10px; padding: 8px; border-radius: 6px; background: #1e293b; font-size: 12px; }
  .panel-row { display: flex; align-items: center; justify-content: space-between; padding: 4px 0; }
  .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 6px; }
  .dot.on { background: #4ade80; box-shadow: 0 0 6px #4ade80; }
  .dot.off { background: #f87171; }
  .dot.pending { background: #fbbf24; }
  .history { margin-top: 10px; padding: 8px; border-radius: 6px; background: #1e293b; }
  .history-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
  .history-head .lbl { font-size: 11px; opacity: .75; text-transform: uppercase; letter-spacing: .5px; }
  .hist-list { max-height: 180px; overflow-y: auto; font-size: 11px; }
  .hist-item { padding: 5px 0; border-top: 1px solid #263449; line-height: 1.35; }
  .hist-item:first-child { border-top: 0; }
  .hist-item .top { display: flex; justify-content: space-between; gap: 6px; }
  .hist-item .name { font-weight: 600; color: #f1f5f9; }
  .hist-item .when { opacity: .55; font-size: 10px; white-space: nowrap; }
  .hist-item .msg { opacity: .8; font-size: 10px; margin-top: 2px; }
  .hist-item .tag { display: inline-block; padding: 1px 5px; border-radius: 4px; font-size: 9px; margin-right: 5px; background: #334155; text-transform: uppercase; letter-spacing: .3px; }
  .hist-empty { opacity: .5; font-size: 11px; text-align: center; padding: 8px 0; }
</style>
</head>
<body>
  <div class="header">
    <img src="icon.png" alt="SuperGestor" />
    <div class="titles">
      <h1>SuperGestor - Auto-Renew</h1>
      <div class="sub">Paineis: P2Cine (daily3 + painelacesso1) + Uniplay - v1.9.0</div>
    </div>
  </div>

  <div class="panels">
    <div class="panel-row">
      <span><span id="dot-p2" class="dot pending"></span> P2Cine <span id="txt-p2" class="warn">verificando...</span></span>
    </div>
    <div class="panel-row">
      <span><span id="dot-up" class="dot pending"></span> Uniplay <span id="txt-up" class="warn">verificando...</span></span>
    </div>
    <button id="openPanels" class="secondary" style="margin-top:6px;">Abrir paineis em segundo plano</button>
  </div>

  <label>Token da extensao</label>
  <input id="token" type="password" placeholder="cole aqui" />

  <label>Meses por renovacao</label>
  <input id="months" placeholder="1" />

  <div class="toggle">
    <input id="enabled" type="checkbox" />
    <label for="enabled" style="margin:0;text-transform:none;letter-spacing:0;font-size:13px;opacity:1;">Ativado</label>
  </div>

  <button id="save">Salvar</button>
  <button id="run" class="secondary">Rodar agora</button>

  <div id="updateBox" style="display:none;margin-top:10px;padding:8px;border-radius:6px;background:#7f1d1d;font-size:11px;">
    Nova versao <span id="newVer"></span> disponivel.
    <a id="dlLink" href="#" target="_blank" style="color:#fecaca;text-decoration:underline;">Baixar</a>
  </div>

  <div class="status">
    <div>Ultima: <span id="lastRun">-</span></div>
    <div id="lastResult">-</div>
    <div>OK: <span class="ok" id="okCount">0</span> - Falhas: <span class="bad" id="failCount">0</span></div>
    <div id="debug" style="margin-top:6px;opacity:.6;font-size:10px;word-break:break-all;"></div>
  </div>

  <div class="history">
    <div class="history-head">
      <span class="lbl">Historico de renovacoes</span>
      <button id="clearHist" class="mini">Limpar</button>
    </div>
    <div id="histList" class="hist-list"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
